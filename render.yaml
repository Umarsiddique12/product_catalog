services:
  - type: web
    name: product-catalog-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGODB_URI
        value: ${MONGODB_URI}
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  - type: static_site
    name: product-catalog-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://product-catalog-backend.onrender.com/api
